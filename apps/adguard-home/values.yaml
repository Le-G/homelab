# AdGuard Home - DNS server with ad blocking and split-horizon DNS
# 
# After deployment:
# 1. Get the LoadBalancer IP: kubectl get svc -n adguard-home adguard-home-dns
# 2. Configure your router's DHCP to use this IP as primary DNS
# 3. The *.le-g.dev rewrite is pre-configured below (update INGRESS_IP)

app-template:
  controllers:
    main:
      containers:
        main:
          image:
            repository: adguard/adguardhome
            tag: v0.107.52
          env:
            TZ: Europe/Paris
          probes:
            liveness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /
                  port: 3000
                initialDelaySeconds: 30
                periodSeconds: 10
            readiness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /
                  port: 3000
                initialDelaySeconds: 5
                periodSeconds: 5

  service:
    main:
      controller: main
      ports:
        http:
          port: 3000
          protocol: HTTP
    dns:
      controller: main
      type: LoadBalancer
      # Uncomment and set a specific IP if using MetalLB
      # annotations:
      #   metallb.universe.tf/loadBalancerIPs: 192.168.1.53
      ports:
        dns-tcp:
          port: 53
          protocol: TCP
          targetPort: 53
        dns-udp:
          port: 53
          protocol: UDP
          targetPort: 53

  ingress:
    main:
      enabled: true
      className: nginx
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
      hosts:
        - host: &host dns.le-g.dev
          paths:
            - path: /
              pathType: Prefix
              service:
                identifier: main
                port: http
      tls:
        - hosts:
            - *host
          secretName: adguard-home-tls-certificate

  persistence:
    config:
      enabled: true
      type: emptyDir
      globalMounts:
        - path: /opt/adguardhome/conf
    work:
      enabled: true
      type: emptyDir
      globalMounts:
        - path: /opt/adguardhome/work
    # Initial config - mounted as read-only, AdGuard copies it on first boot
    initial-config:
      enabled: true
      type: configMap
      name: adguard-home-config
      globalMounts:
        - path: /opt/adguardhome/conf/AdGuardHome.yaml
          subPath: AdGuardHome.yaml
          readOnly: false

  configMaps:
    config:
      enabled: true
      data:
        AdGuardHome.yaml: |
          http:
            pprof:
              port: 6060
              enabled: false
            address: 0.0.0.0:3000
            session_ttl: 720h
          users: []
          auth_attempts: 5
          block_auth_min: 15
          http_proxy: ""
          language: ""
          theme: auto
          dns:
            bind_hosts:
              - 0.0.0.0
            port: 53
            anonymize_client_ip: false
            ratelimit: 20
            ratelimit_subnet_len_ipv4: 24
            ratelimit_subnet_len_ipv6: 56
            ratelimit_whitelist: []
            refuse_any: true
            upstream_dns:
              - https://dns.cloudflare.com/dns-query
              - https://dns.google/dns-query
            upstream_dns_file: ""
            bootstrap_dns:
              - 1.1.1.1
              - 8.8.8.8
            fallback_dns: []
            upstream_mode: parallel
            fastest_timeout: 1s
            allowed_clients: []
            disallowed_clients: []
            blocked_hosts:
              - version.bind
              - id.server
              - hostname.bind
            trusted_proxies:
              - 127.0.0.0/8
              - ::1/128
            cache_size: 4194304
            cache_ttl_min: 0
            cache_ttl_max: 0
            cache_optimistic: false
            bogus_nxdomain: []
            aaaa_disabled: false
            enable_dnssec: true
            edns_client_subnet:
              custom_ip: ""
              enabled: false
              use_custom: false
            max_goroutines: 300
            handle_ddr: true
            ipset: []
            ipset_file: ""
            bootstrap_prefer_ipv6: false
            upstream_timeout: 10s
            private_networks: []
            use_private_ptr_resolvers: true
            local_ptr_upstreams: []
            use_dns64: false
            dns64_prefixes: []
            serve_http3: false
            use_http3_upstreams: false
            serve_plain_dns: true
            hostsfile_enabled: true
          tls:
            enabled: false
            server_name: ""
            force_https: false
            port_https: 443
            port_dns_over_tls: 853
            port_dns_over_quic: 784
            port_dnscrypt: 0
            dnscrypt_config_file: ""
            allow_unencrypted_doh: false
            certificate_chain: ""
            private_key: ""
            certificate_path: ""
            private_key_path: ""
            strict_sni_check: false
          querylog:
            dir_path: ""
            ignored: []
            interval: 2160h
            size_memory: 1000
            enabled: true
            file_enabled: true
          statistics:
            dir_path: ""
            ignored: []
            interval: 168h
            enabled: true
          filters:
            - enabled: true
              url: https://adguardteam.github.io/HostlistsRegistry/assets/filter_1.txt
              name: AdGuard DNS filter
              id: 1
            - enabled: true
              url: https://adguardteam.github.io/HostlistsRegistry/assets/filter_2.txt
              name: AdAway Default Blocklist
              id: 2
          whitelist_filters: []
          user_rules: []
          dhcp:
            enabled: false
            interface_name: ""
            local_domain_name: lan
            dhcpv4:
              gateway_ip: ""
              subnet_mask: ""
              range_start: ""
              range_end: ""
              lease_duration: 86400
              icmp_timeout_msec: 1000
              options: []
            dhcpv6:
              range_start: ""
              lease_duration: 86400
              ra_slaac_only: false
              ra_allow_slaac: false
          filtering:
            blocking_ipv4: ""
            blocking_ipv6: ""
            blocked_services:
              schedule:
                time_zone: Europe/Paris
              ids: []
            protection_disabled_until: null
            safe_search:
              enabled: false
              bing: true
              duckduckgo: true
              google: true
              pixabay: true
              yandex: true
              youtube: true
            blocking_mode: default
            parental_block_host: family-block.dns.adguard.com
            safebrowsing_block_host: standard-block.dns.adguard.com
            rewrites:
              # ============================================
              # SPLIT-HORIZON DNS: *.le-g.dev → local ingress
              # ============================================
              # TODO: Replace with your ingress-nginx LoadBalancer IP
              - domain: '*.le-g.dev'
                answer: 192.168.1.X  # <-- CHANGE THIS to your ingress IP
            safebrowsing_cache_size: 1048576
            safesearch_cache_size: 1048576
            parental_cache_size: 1048576
            cache_time: 30
            filters_update_interval: 24
            blocked_response_ttl: 10
            filtering_enabled: true
            parental_enabled: false
            safebrowsing_enabled: false
            protection_enabled: true
          clients:
            runtime_sources:
              whois: true
              arp: true
              rdns: true
              dhcp: true
              hosts: true
            persistent: []
          log:
            file: ""
            max_backups: 0
            max_size: 100
            max_age: 3
            compress: false
            local_time: false
            verbose: false
          os:
            group: ""
            user: ""
            rlimit_nofile: 0
          schema_version: 28
