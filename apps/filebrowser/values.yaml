app-template:
  controllers:
    main:
      containers:
        main:
          image:
            repository: docker.io/filebrowser/filebrowser
            tag: v2.31.2
          env:
            FB_DATABASE: /database/filebrowser.db
            FB_ROOT: /srv
            FB_PORT: "80"
  service:
    main:
      ports:
        http:
          port: 80
          protocol: HTTP
  ingress:
    main:
      enabled: true
      className: nginx
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
        external-dns.alpha.kubernetes.io/target: homelab-tunnel.le-g.dev
        external-dns.alpha.kubernetes.io/cloudflare-proxied: 'true'
        nginx.ingress.kubernetes.io/proxy-body-size: "0"  # No upload size limit
      hosts:
        - host: &host files.le-g.dev
          paths:
            - path: /
              pathType: Prefix
              service:
                name: main
                port: http
      tls:
        - hosts:
            - *host
          secretName: filebrowser-tls-certificate
  persistence:
    # App config + database (Longhorn)
    config:
      enabled: true
      storageClassName: longhorn
      accessMode: ReadWriteOnce
      size: 10Gi
      globalMounts:
        - path: /database
          subPath: database
        - path: /config
          subPath: config
    # NAS mount for files - TO ENABLE when mount point is created
