app-template:
  defaultPodOptions:
    securityContext:
      fsGroup: 1000
  controllers:
    main:
      enabled: false
    jellyfin:
      pod:
        nodeSelector:
          intel.feature.node.kubernetes.io/gpu: "true"
      containers:
        main:
          env:
            PUID: 1000
            PGID: 1000
          image:
            repository: docker.io/jellyfin/jellyfin
            tag: 10.11.6
          resources:
            limits:
              gpu.intel.com/i915: "1"
    transmission:
      containers:
        main:
          env:
            PUID: 0
            PGID: 0
            WHITELIST: "*"
            HOST_WHITELIST: "transmission.le-g.dev"
          image:
            repository: lscr.io/linuxserver/transmission
            tag: 4.0.6
    qbittorrent:
      initContainers:
        init-config:
          image:
            repository: docker.io/library/busybox
            tag: 1.37.0
          command:
            - /bin/sh
            - -c
            - |
              CONFIG_FILE=/config/qBittorrent/qBittorrent.conf
              if [ -f "$CONFIG_FILE" ]; then
                echo "Config already present, leaving in place"
                exit 0
              fi
              echo "Seeding initial qBittorrent.conf for ingress access"
              mkdir -p /config/qBittorrent
              cat > "$CONFIG_FILE" <<'EOF'
              [BitTorrent]
              Session\DefaultSavePath=/downloads/complete
              Session\TempPath=/downloads/incomplete
              Session\TempPathEnabled=true

              [Preferences]
              WebUI\Address=*
              WebUI\Port=8080
              WebUI\HostHeaderValidation=false
              WebUI\CSRFProtection=false
              EOF
              chown -R 0:0 /config/qBittorrent
      containers:
        main:
          env:
            PUID: 0
            PGID: 0
            WEBUI_PORT: 8080
            TORRENTING_PORT: 6881
          image:
            repository: lscr.io/linuxserver/qbittorrent
            # 4.6.7 is the last 4.x LSIO tag. Pinned because qBittorrent 5.x
            # changed POST /api/v2/auth/login to reply HTTP 204 (empty body)
            # instead of "Ok." Radarr/Sonarr still parse the body string and
            # treat empty as auth failure, so the *arr stack can't talk to
            # qbit 5.x on the current Radarr 5.26.2 / Sonarr 4.0.15 versions.
            tag: 4.6.7
    prowlarr:
      initContainers:
        ygg-definitions:
          image:
            repository: docker.io/curlimages/curl
            tag: 8.11.0
          command:
            - /bin/sh
            - -c
            - |
              echo "Downloading YGG indexer definitions..."
              mkdir -p /shared/custom-definitions
              
              # Download yggtorrent.yml
              curl -fsSL "https://raw.githubusercontent.com/Prowlarr/Indexers/17e54db771ee41658a26fe96e5529574724f633f/definitions/v11/yggtorrent.yml" \
                -o /shared/custom-definitions/yggtorrent.yml
              
              # Download yggcookie.yml  
              curl -fsSL "https://raw.githubusercontent.com/Prowlarr/Indexers/17e54db771ee41658a26fe96e5529574724f633f/definitions/v11/yggcookie.yml" \
                -o /shared/custom-definitions/yggcookie.yml
              
              echo "YGG definitions downloaded successfully!"
              ls -la /shared/custom-definitions/
      containers:
        main:
          env:
            PUID: 0
            PGID: 0
          image:
            repository: lscr.io/linuxserver/prowlarr
            tag: 2.3.0
    radarr:
      containers:
        main:
          env:
            PUID: 0
            PGID: 0
          image:
            repository: lscr.io/linuxserver/radarr
            tag: 5.26.2
    sonarr:
      containers:
        main:
          env:
            PUID: 0
            PGID: 0
          image:
            repository: lscr.io/linuxserver/sonarr
            tag: 4.0.15
    jellyseerr:
      containers:
        main:
          env:
            PUID: 0
            PGID: 0
          image:
            repository: docker.io/fallenbagel/jellyseerr
            tag: 2.7.3
    flaresolverr:
      containers:
        main:
          image:
            repository: ghcr.io/flaresolverr/flaresolverr
            tag: v3.3.21
  service:
    main:
      enabled: false
    jellyfin:
      controller: jellyfin
      ports:
        http:
          port: 8096
          protocol: HTTP
    transmission:
      controller: transmission
      ports:
        http:
          port: 9091
          protocol: HTTP
        torrent:
          port: 51413
          protocol: TCP
    qbittorrent:
      controller: qbittorrent
      ports:
        http:
          port: 8080
          protocol: HTTP
        torrent:
          port: 6881
          protocol: TCP
    prowlarr:
      controller: prowlarr
      ports:
        http:
          port: 9696
          protocol: HTTP
    radarr:
      controller: radarr
      ports:
        http:
          port: 7878
          protocol: HTTP
    sonarr:
      controller: sonarr
      ports:
        http:
          port: 8989
          protocol: HTTP
    jellyseerr:
      controller: jellyseerr
      ports:
        http:
          port: 5055
          protocol: HTTP
    flaresolverr:
      controller: flaresolverr
      ports:
        http:
          port: 8191
          protocol: HTTP
  ingress:
    public:
      enabled: true
      className: nginx
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
        external-dns.alpha.kubernetes.io/target: homelab-tunnel.le-g.dev
        external-dns.alpha.kubernetes.io/cloudflare-proxied: 'true'
      hosts:
        - host: &jellyfinHost jellyfin.le-g.dev
          paths:
            - path: /
              pathType: Prefix
              service:
                name: jellyfin
                port: http
        - host: &jellyseerrHost jellyseerr.le-g.dev
          paths:
            - path: /
              pathType: Prefix
              service:
                name: jellyseerr
                port: http
      tls:
        - secretName: jellyfin-public-tls-certificate
          hosts:
            - *jellyfinHost
            - *jellyseerrHost
    media-stack:
      enabled: true
      className: nginx
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
      hosts:
        - host: &transmissionHost transmission.le-g.dev
          paths:
            - path: /
              pathType: Prefix
              service:
                name: transmission
                port: http
        - host: &qbittorrentHost qbittorrent.le-g.dev
          paths:
            - path: /
              pathType: Prefix
              service:
                name: qbittorrent
                port: http
        - host: &prowlarrHost prowlarr.le-g.dev
          paths:
            - path: /
              pathType: Prefix
              service:
                name: prowlarr
                port: http
        - host: &radarrHost radarr.le-g.dev
          paths:
            - path: /
              pathType: Prefix
              service:
                name: radarr
                port: http
        - host: &sonarrHost sonarr.le-g.dev
          paths:
            - path: /
              pathType: Prefix
              service:
                name: sonarr
                port: http
        - host: &flaresolverrHost flaresolverr.le-g.dev
          paths:
            - path: /
              pathType: Prefix
              service:
                name: flaresolverr
                port: http
      tls:
        - secretName: jellyfin-tls-certificate
          hosts:
            - *transmissionHost
            - *qbittorrentHost
            - *prowlarrHost
            - *radarrHost
            - *sonarrHost
            - *flaresolverrHost
  persistence:
    data:
      accessMode: ReadWriteMany
      size: 200Gi
      storageClassName: longhorn
      advancedMounts:
        jellyfin:
          main:
            - path: /config
              subPath: jellyfin/config
        transmission:
          main:
            - path: /config
              subPath: transmission/config
        qbittorrent:
          init-config:
            - path: /config
              subPath: qbittorrent/config
          main:
            - path: /config
              subPath: qbittorrent/config
        prowlarr:
          main:
            - path: /config
              subPath: prowlarr/config
        radarr:
          main:
            - path: /config
              subPath: radarr/config
        sonarr:
          main:
            - path: /config
              subPath: sonarr/config
        jellyseerr:
          main:
            - path: /app/config
              subPath: jellyseerr/config
    nas:
      enabled: true
      type: nfs
      server: 192.168.1.181
      path: /mnt/main/medias
      advancedMounts:
        jellyfin:
          main:
            - path: /media
        transmission:
          main:
            - path: /downloads/incomplete
              subPath: downloads/incomplete
            - path: /downloads/complete
              subPath: downloads/complete
        qbittorrent:
          main:
            - path: /downloads/incomplete
              subPath: downloads/incomplete
            - path: /downloads/complete
              subPath: downloads/complete
        radarr:
          main:
            - path: /downloads/complete
              subPath: downloads/complete
            - path: /movies
              subPath: media/movies
        sonarr:
          main:
            - path: /downloads/complete
              subPath: downloads/complete
            - path: /tvshows
              subPath: media/tvshows
    shared-definitions:
      enabled: true
      type: emptyDir
      advancedMounts:
        prowlarr:
          ygg-definitions:
            - path: /shared
          main:
            - path: /config/Definitions/Custom
              subPath: custom-definitions
    jellyseerr-logs:
      enabled: true
      type: emptyDir
      advancedMounts:
        jellyseerr:
          main:
            - path: /app/config/logs
