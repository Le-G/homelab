apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cross-seed-secret
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: global-secrets
  target:
    name: cross-seed-secret
    creationPolicy: Owner
  data:
    - secretKey: cross-seed-api-key
      remoteRef:
        key: cross-seed.api-key
        property: api-key
    - secretKey: sonarr-api-key
      remoteRef:
        key: cross-seed.sonarr-api-key
        property: sonarr-api-key
    - secretKey: radarr-api-key
      remoteRef:
        key: cross-seed.radarr-api-key
        property: radarr-api-key
