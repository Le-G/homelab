app-template:
  controllers:
    main:
      type: deployment
      replicas: 1
      strategy: Recreate

      containers:
        main:
          image:
            repository: docker.io/adguard/adguardhome
            tag: v0.107.55

          probes:
            liveness:
              enabled: false
            readiness:
              enabled: false
            startup:
              enabled: false

      initContainers:
        init-config:
          image:
            repository: docker.io/busybox
            tag: latest
          command: ['sh', '-c', 'cp -n /init-config/AdGuardHome.yaml /config/AdGuardHome.yaml']

  service:
    main:
      controller: main
      ports:
        http:
          port: 3000
          protocol: HTTP
    dns:
      controller: main
      type: LoadBalancer
      ports:
        dns-tcp:
          port: 53
          protocol: TCP
        dns-udp:
          port: 53
          protocol: UDP

  ingress:
    main:
      enabled: true
      className: nginx
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
      hosts:
        - host: &host adguard.le-g.dev
          paths:
            - path: /
              pathType: Prefix
              service:
                identifier: main
                port: http
      tls:
        - hosts:
            - *host
          secretName: adguard-tls-certificate

  persistence:
    data:
      enabled: true
      type: persistentVolumeClaim
      storageClass: longhorn
      accessMode: ReadWriteOnce
      size: 2Gi
      advancedMounts:
        main:
          main:
            - path: /opt/adguardhome/work
              subPath: work
            - path: /opt/adguardhome/conf
              subPath: conf
          init-config:
            - path: /config
              subPath: conf
    config:
      enabled: true
      type: configMap
      name: adguard
      advancedMounts:
        main:
          init-config:
            - path: /init-config/AdGuardHome.yaml
              subPath: AdGuardHome.yaml

  configMaps:
    bootstrap-config:
      enabled: true
      data:
        AdGuardHome.yaml: |
          http:
            pprof:
              port: 6060
              enabled: false
            address: 0.0.0.0:3000
            session_ttl: 720h
          users:
            - name: admin
              password: $2y$10$APv7YU/NzOV1H0.sgO63JOS6mhFJwWCk3jpypT.NOfjLSgbKqIfa6
          dns:
            bind_hosts:
              - 0.0.0.0
            port: 53
            protection_enabled: true
            filtering_enabled: true
            upstream_dns:
              - https://dns.cloudflare.com/dns-query
              - https://dns.google/dns-query
            bootstrap_dns:
              - 1.1.1.1
              - 8.8.8.8
            rewrites:
              - domain: '*.le-g.dev'
                answer: 192.168.1.1
          filters:
            - enabled: true
              url: https://adguardteam.github.io/HostlistsRegistry/assets/filter_1.txt
              name: AdGuard DNS filter
              id: 1
            - enabled: true
              url: https://adguardteam.github.io/HostlistsRegistry/assets/filter_2.txt
              name: AdAway Default Blocklist
              id: 2
          schema_version: 28
